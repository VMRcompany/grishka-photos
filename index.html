<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Гришка AI — Фотогенератор</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .animate-in { animation: fadeIn 0.3s both; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .glass-input { background: white; border: 1px solid #f1f5f9; box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.05); }
        .input-shadow { box-shadow: 0 10px 30px -10px rgba(0,0,0,0.1); }
        .circle-btn { width: 48px; height: 48px; border-radius: 50%; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
        .profile-btn { width: 40px; height: 40px; border-radius: 50%; overflow: hidden; display: flex; align-items: center; justify-content: center; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 min-h-screen">
    <div id="root"></div>

    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/htm@3.1.1/dist/htm.umd.js"></script>
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, onAuthStateChanged, signInWithPopup, GoogleAuthProvider, signOut, signInWithEmailAndPassword, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, collection, addDoc, query, orderBy, limit, onSnapshot, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import { GoogleGenAI } from "https://esm.run/@google/genai";

        const html = htm.bind(React.createElement);

        const firebaseConfig = {
            projectId: "gen-lang-client-0020876863",
            appId: "1:1028257117288:web:c4b079e2ccf1becbc177dd",
            apiKey: "AIzaSyC-Ot04UT6IYPH9M0kS54srXu6eI9UgmqQ",
            authDomain: "gen-lang-client-0020876863.firebaseapp.com",
            firestoreDatabaseId: "ai-studio-fdfe8765-0683-4757-9205-f80f35a2bddd"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app, firebaseConfig.firestoreDatabaseId);

        const ICONS = {
            paperclip: html`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="w-5 h-5"><path d="m21.44 11.05-9.19 9.19a6 6 0 0 1-8.49-8.49l8.57-8.57A4 4 0 1 1 18 8.84l-8.59 8.51a2 2 0 0 1-2.83-2.83l8.49-8.48"/></svg>`,
            arrow: html`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" class="w-5 h-5"><path d="M5 12h14m-7-7 7 7-7 7"/></svg>`,
            user: html`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="w-5 h-5"><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>`,
            x: html`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="w-6 h-6"><path d="M18 6 6 18M6 6l12 12"/></svg>`,
            refresh: html`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="w-5 h-5 animate-spin"><path d="M21 12a9 9 0 1 1-9-9c2.52 0 4.93 1 6.74 2.74L21 8"/><path d="M21 3v5h-5"/></svg>`,
            image: html`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="w-8 h-8 opacity-10"><rect width="18" height="18" x="3" y="3" rx="2" ry="2"/><circle cx="9" cy="9" r="2"/><path d="m21 15-3.086-3.086a2 2 0 0 0-2.828 0L6 21"/></svg>`
        };

        function App() {
            const [prompt, setPrompt] = React.useState('');
            const [status, setStatus] = React.useState('IDLE');
            const [result, setResult] = React.useState(null);
            const [user, setUser] = React.useState(null);
            const [history, setHistory] = React.useState([]);
            const [showAuth, setShowAuth] = React.useState(false);
            const [email, setEmail] = React.useState('');
            const [password, setPassword] = React.useState('');
            const [authMode, setAuthMode] = React.useState('LOGIN');

            React.useEffect(() => {
                const hash = window.location.hash;
                if (hash.includes('access_token=')) {
                    const token = hash.split('access_token=')[1].split('&')[0];
                    fetch(`https://login.yandex.ru/info?format=json&oauth_token=${token}`)
                        .then(r => r.json())
                        .then(data => {
                            const yandexUser = {
                                uid: 'yandex_' + data.id,
                                displayName: data.real_name || data.display_name,
                                email: data.default_email,
                                photoURL: data.is_avatar_empty ? null : `https://avatars.yandex.net/get-yapic/${data.default_avatar_id}/islands-200`,
                                isYandex: true
                            };
                            setUser(yandexUser);
                            localStorage.setItem('grishka_user', JSON.stringify(yandexUser));
                            window.location.hash = '';
                        });
                } else {
                    const saved = localStorage.getItem('grishka_user');
                    if (saved) setUser(JSON.parse(saved));
                }

                onAuthStateChanged(auth, (u) => {
                    if (u) {
                        setUser(u);
                        localStorage.removeItem('grishka_user');
                    }
                });
            }, []);

            React.useEffect(() => {
                if (!user) {
                    setHistory(JSON.parse(localStorage.getItem('grishka_history') || '[]'));
                    return;
                }
                const q = query(collection(db, 'users', user.uid, 'history'), orderBy('timestamp', 'desc'), limit(12));
                return onSnapshot(q, (snap) => setHistory(snap.docs.map(d => ({ id: d.id, ...d.data() }))));
            }, [user]);

            const handleGenerate = async () => {
                if (!prompt.trim()) return;
                setStatus('LOADING');
                try {
                    const genAI = new GoogleGenAI({ apiKey: "AIzaSyDvZAYpV2mCE3fy1Ni4qi5UBZv0ht71bsI" });
                    const model = genAI.getGenerativeModel({ model: "gemini-2.5-flash-image" });
                    const res = await model.generateContent(prompt);
                    const part = res.response.candidates[0].content.parts.find(p => p.inlineData);
                    const url = `data:image/png;base64,${part.inlineData.data}`;
                    
                    const newGen = { prompt, url, timestamp: Date.now() };
                    setResult(newGen);

                    if (user && !user.isYandex) {
                        await addDoc(collection(db, 'users', user.uid, 'history'), { prompt, timestamp: serverTimestamp() });
                    } else {
                        const newHist = [newGen, ...history].slice(0, 10);
                        setHistory(newHist);
                        localStorage.setItem('grishka_history', JSON.stringify(newHist));
                    }
                    setStatus('SUCCESS');
                } catch (e) { setStatus('ERROR'); }
            };

            const handleYandex = () => {
                const clientId = "b4abebe0dc694bbbbf328a60c3d9e6bf";
                const redirect = "https://grishka-photos.vercel.app/";
                window.location.href = `https://oauth.yandex.ru/authorize?response_type=token&client_id=${clientId}&redirect_uri=${redirect}`;
            };

            const handleLogout = () => {
                signOut(auth);
                setUser(null);
                localStorage.removeItem('grishka_user');
                setShowAuth(false);
            };

            return html`
                <div class="max-w-2xl mx-auto py-12 px-6">
                    <header class="flex justify-between items-center mb-12">
                        <div class="w-10"></div>
                        <h1 class="text-2xl md:text-3xl font-extrabold tracking-tight text-center leading-tight">
                            Сгенерируй фото <span class="italic font-medium text-slate-400">вместе с Гришкой AI</span>
                        </h1>
                        <button onClick=${() => setShowAuth(true)} class="profile-btn bg-white border border-slate-100 shadow-sm hover:scale-105 transition-transform">
                            ${user?.photoURL ? html`<img src=${user.photoURL} class="w-full h-full object-cover" />` : (user ? html`<div class="w-full h-full bg-black text-white flex items-center justify-center font-bold text-lg">${(user.displayName || user.email)?.[0].toUpperCase()}</div>` : ICONS.user)}
                        </button>
                    </header>

                    <div class="relative mb-16">
                        <div class="glass-input input-shadow p-1.5 rounded-full flex items-center">
                            <div class="p-3 text-slate-300">${ICONS.paperclip}</div>
                            <input 
                                value=${prompt} 
                                onChange=${(e) => setPrompt(e.target.value)}
                                onKeyDown=${(e) => e.key === 'Enter' && handleGenerate()}
                                placeholder="Опиши фото мечты..." 
                                class="flex-1 px-2 py-3 outline-none text-lg font-medium placeholder:text-slate-200"
                            />
                            <button onClick=${handleGenerate} class="circle-btn bg-black text-white hover:opacity-80 transition-all">
                                ${status === 'LOADING' ? ICONS.refresh : ICONS.arrow}
                            </button>
                        </div>
                    </div>

                    <div class="min-h-[400px]">
                        ${status === 'LOADING' && html`
                            <div class="flex flex-col items-center py-24 animate-pulse">
                                <div class="w-12 h-12 border-4 border-slate-100 border-t-black rounded-full animate-spin mb-6"></div>
                                <p class="text-[10px] font-bold text-slate-300 uppercase tracking-[0.3em]">Гришка колдует...</p>
                            </div>
                        `}
                        
                        ${status === 'SUCCESS' && result && html`
                            <div class="animate-in space-y-8">
                                <div class="bg-white p-2 rounded-[2.5rem] shadow-2xl border border-slate-100">
                                    <img src=${result.url} class="w-full rounded-[2rem]" />
                                </div>
                                <div class="text-center">
                                    <button onClick=${() => setStatus('IDLE')} class="text-[10px] font-bold text-slate-300 uppercase tracking-[0.3em] hover:text-black transition-colors">Начать заново</button>
                                </div>
                            </div>
                        `}

                        ${status === 'IDLE' && !result && html`
                            <div class="grid grid-cols-2 gap-6 opacity-[0.03]">
                                <div class="aspect-square bg-black rounded-[2.5rem]"></div>
                                <div class="aspect-square bg-black rounded-[2.5rem]"></div>
                            </div>
                        `}
                    </div>

                    ${history.length > 0 && html`
                        <div class="mt-24 border-t border-slate-100 pt-12">
                            <h2 class="text-[10px] font-bold text-slate-300 uppercase tracking-[0.4em] mb-8 text-center">История генераций</h2>
                            <div class="grid grid-cols-3 md:grid-cols-4 gap-4">
                                ${history.map(item => html`
                                    <div onClick=${() => { setPrompt(item.prompt); window.scrollTo({top: 0, behavior: 'smooth'}); }} class="aspect-square bg-white rounded-2xl border border-slate-100 overflow-hidden cursor-pointer hover:border-black transition-all group">
                                        ${item.url ? html`<img src=${item.url} class="w-full h-full object-cover" />` : html`<div class="w-full h-full flex items-center justify-center bg-slate-50">${ICONS.image}</div>`}
                                    </div>
                                `)}
                            </div>
                        </div>
                    `}
                </div>

                ${showAuth && html`
                    <div class="fixed inset-0 bg-black/60 backdrop-blur-sm flex items-center justify-center p-4 z-[100] animate-in">
                        <div class="bg-white w-full max-w-md rounded-[3rem] p-10 shadow-2xl relative">
                            <button onClick=${() => setShowAuth(false)} class="absolute top-8 right-8 text-slate-300 hover:text-black transition-colors">
                                ${ICONS.x}
                            </button>
                            
                            <h2 class="text-2xl font-bold mb-10">Личный кабинет</h2>
                            
                            ${user ? html`
                                <div class="text-center space-y-6">
                                    <div class="w-24 h-24 rounded-full mx-auto border-4 border-slate-50 shadow-md overflow-hidden bg-black flex items-center justify-center">
                                        ${user.photoURL ? html`<img src=${user.photoURL} class="w-full h-full object-cover" />` : html`<span class="text-white text-3xl font-bold">${(user.displayName || user.email)?.[0].toUpperCase()}</span>`}
                                    </div>
                                    <div>
                                        <p class="font-bold text-xl">${user.displayName || 'Пользователь'}</p>
                                        <p class="text-slate-400 text-sm">${user.email}</p>
                                    </div>
                                    <button onClick=${handleLogout} class="w-full bg-slate-100 py-5 rounded-2xl font-bold hover:bg-red-50 hover:text-red-600 transition-all">Выйти из аккаунта</button>
                                </div>
                            ` : html`
                                <div class="space-y-4">
                                    <button onClick=${() => signInWithPopup(auth, new GoogleAuthProvider())} class="w-full border-2 border-slate-100 py-4 rounded-2xl font-bold flex items-center justify-center gap-4 hover:bg-slate-50 transition-all">
                                        <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" class="w-6" /> Google
                                    </button>
                                    <button onClick=${handleYandex} class="w-full bg-[#ff0000] text-white py-4 rounded-2xl font-bold flex items-center justify-center gap-4 hover:opacity-90 transition-all">
                                        <span class="text-xl font-black">Я</span> Яндекс ID
                                    </button>
                                    
                                    <div class="relative flex items-center py-4">
                                        <div class="flex-grow border-t border-slate-100"></div>
                                        <span class="mx-4 text-[10px] font-bold text-slate-200 uppercase tracking-widest">или почта</span>
                                        <div class="flex-grow border-t border-slate-100"></div>
                                    </div>
                                    
                                    <input placeholder="Email" class="w-full bg-slate-50 p-5 rounded-2xl outline-none focus:ring-2 focus:ring-black/5" onChange=${e => setEmail(e.target.value)} />
                                    <input type="password" placeholder="Пароль" class="w-full bg-slate-50 p-5 rounded-2xl outline-none focus:ring-2 focus:ring-black/5" onChange=${e => setPassword(e.target.value)} />
                                    
                                    <button onClick=${async () => {
                                        try {
                                            if (authMode === 'LOGIN') await signInWithEmailAndPassword(auth, email, password);
                                            else await createUserWithEmailAndPassword(auth, email, password);
                                            setShowAuth(false);
                                        } catch (e) { alert('Ошибка: ' + e.message); }
                                    }} class="w-full bg-black text-white py-5 rounded-2xl font-bold shadow-xl hover:opacity-80 transition-all">
                                        ${authMode === 'LOGIN' ? 'Войти' : 'Зарегистрироваться'}
                                    </button>
                                    
                                    <button onClick=${() => setAuthMode(authMode === 'LOGIN' ? 'SIGNUP' : 'LOGIN')} class="w-full text-[10px] font-bold text-slate-300 uppercase tracking-widest hover:text-black transition-colors">
                                        ${authMode === 'LOGIN' ? 'Нет аккаунта? Зарегистрироваться' : 'Уже есть аккаунт? Войти'}
                                    </button>
                                </div>
                            `}
                        </div>
                    </div>
                `}
                <footer class="py-12 text-center opacity-20 text-[9px] font-bold uppercase tracking-[0.5em]">© 2024 Grishka AI</footer>
            `;
        }

        ReactDOM.createRoot(document.getElementById('root')).render(html`<${App} />`);
    </script>
</body>
</html>
