<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Гришка AI — Фотогенератор</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .animate-in { animation: fadeIn 0.4s both; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .glass-input { background: white; border: 1px solid #f1f5f9; box-shadow: 0 25px 50px -12px rgb(0 0 0 / 0.1); }
        .btn-active { background: black; color: white; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 min-h-screen">
    <div id="root"></div>

    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/htm@3.1.1/dist/htm.umd.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, onAuthStateChanged, signInWithPopup, GoogleAuthProvider, signOut, signInWithEmailAndPassword, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, doc, collection, addDoc, query, orderBy, limit, onSnapshot, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import { GoogleGenAI } from "https://esm.run/@google/genai";

        const html = htm.bind(React.createElement);

        const firebaseConfig = {
            projectId: "gen-lang-client-0020876863",
            appId: "1:1028257117288:web:c4b079e2ccf1becbc177dd",
            apiKey: "AIzaSyC-Ot04UT6IYPH9M0kS54srXu6eI9UgmqQ",
            authDomain: "gen-lang-client-0020876863.firebaseapp.com",
            firestoreDatabaseId: "ai-studio-fdfe8765-0683-4757-9205-f80f35a2bddd"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app, firebaseConfig.firestoreDatabaseId);

        function App() {
            const [prompt, setPrompt] = React.useState('');
            const [aspect, setAspect] = React.useState('1:1');
            const [status, setStatus] = React.useState('IDLE');
            const [result, setResult] = React.useState(null);
            const [user, setUser] = React.useState(null);
            const [history, setHistory] = React.useState([]);
            const [showAuth, setShowAuth] = React.useState(false);
            const [authMode, setAuthMode] = React.useState('LOGIN'); // LOGIN or SIGNUP
            const [email, setEmail] = React.useState('');
            const [password, setPassword] = React.useState('');

            const Icon = ({ name, size = 20, className = "" }) => {
                const ref = React.useRef(null);
                React.useEffect(() => {
                    if (ref.current) {
                        ref.current.innerHTML = '';
                        const icon = lucide.icons[name];
                        if (icon) {
                            const svg = lucide.createIcons({ icons: { [name]: icon }, nameAttr: 'data-lucide' });
                            const element = document.createElement('div');
                            element.innerHTML = icon.toSvg({ size, class: className });
                            ref.current.appendChild(element.firstChild);
                        }
                    }
                }, [name, size, className]);
                return html`<div ref=${ref} class="inline-flex"></div>`;
            };

            React.useEffect(() => {
                onAuthStateChanged(auth, (u) => {
                    setUser(u);
                    if (!u) setHistory(JSON.parse(localStorage.getItem('grishka_history') || '[]'));
                });
            }, []);

            React.useEffect(() => {
                if (!user) return;
                const q = query(collection(db, 'users', user.uid, 'history'), orderBy('timestamp', 'desc'), limit(12));
                return onSnapshot(q, (snap) => setHistory(snap.docs.map(d => ({ id: d.id, ...d.data() }))));
            }, [user]);

            const handleGenerate = async () => {
                if (!prompt.trim()) return;
                setStatus('LOADING');
                try {
                    const genAI = new GoogleGenAI({ apiKey: "AIzaSyDvZAYpV2mCE3fy1Ni4qi5UBZv0ht71bsI" });
                    const model = genAI.getGenerativeModel({ model: "gemini-2.5-flash-image" });
                    
                    const res = await model.generateContent({
                        contents: [{ parts: [{ text: prompt }] }],
                        config: { imageConfig: { aspectRatio: aspect } }
                    });
                    
                    const part = res.response.candidates[0].content.parts.find(p => p.inlineData);
                    const url = `data:image/png;base64,${part.inlineData.data}`;
                    
                    const newGen = { prompt, url, aspect, timestamp: Date.now() };
                    setResult(newGen);

                    if (user) {
                        await addDoc(collection(db, 'users', user.uid, 'history'), { prompt, aspect, timestamp: serverTimestamp() });
                    } else {
                        const newHist = [newGen, ...history].slice(0, 10);
                        setHistory(newHist);
                        localStorage.setItem('grishka_history', JSON.stringify(newHist));
                    }
                    setStatus('SUCCESS');
                } catch (e) { setStatus('ERROR'); }
            };

            const handleAuth = async () => {
                try {
                    if (authMode === 'LOGIN') await signInWithEmailAndPassword(auth, email, password);
                    else await createUserWithEmailAndPassword(auth, email, password);
                    setShowAuth(false);
                } catch (e) { alert(e.message); }
            };

            const handleYandex = () => {
                const clientId = "b4abebe0dc694bbbbf328a60c3d9e6bf";
                const redirect = "https://grishka-photos.vercel.app/";
                window.location.href = `https://oauth.yandex.ru/authorize?response_type=token&client_id=${clientId}&redirect_uri=${redirect}`;
            };

            const download = () => {
                const a = document.createElement('a');
                a.href = result.url;
                a.download = `grishka-${Date.now()}.png`;
                a.click();
            };

            return html`
                <div class="max-w-2xl mx-auto py-12 px-6">
                    <header class="flex justify-between items-center mb-12">
                        <div class="w-10"></div>
                        <h1 class="text-2xl md:text-4xl font-extrabold tracking-tight text-center">
                            Сгенерируй фото <span class="italic font-medium text-slate-800">вместе с Гришкой AI</span>
                        </h1>
                        <button onClick=${() => setShowAuth(true)} class="w-10 h-10 bg-white shadow-sm border rounded-full flex items-center justify-center overflow-hidden hover:scale-110 transition-all">
                            ${user ? html`<img src=${user.photoURL || 'https://ui-avatars.com/api/?name=' + user.email} class="w-full h-full" />` : html`<${Icon} name="user" className="text-slate-400" />`}
                        </button>
                    </header>

                    <div class="glass-input p-1.5 rounded-full flex items-center mb-6">
                        <button class="p-3 text-slate-300 hover:text-black transition-colors"><${Icon} name="paperclip" /></button>
                        <input 
                            value=${prompt} 
                            onChange=${(e) => setPrompt(e.target.value)}
                            onKeyDown=${(e) => e.key === 'Enter' && handleGenerate()}
                            placeholder="Опиши фото мечты..." 
                            class="flex-1 px-2 py-3 outline-none text-lg font-medium placeholder:text-slate-200"
                        />
                        <button onClick=${handleGenerate} class="bg-black text-white p-4 rounded-full hover:opacity-80 transition-all shadow-lg">
                            ${status === 'LOADING' ? html`<${Icon} name="refresh-cw" className="animate-spin" />` : html`<${Icon} name="arrow-right" />`}
                        </button>
                    </div>

                    <div class="flex justify-center gap-2 mb-12">
                        ${['1:1', '9:16', '16:9'].map(a => html`
                            <button 
                                onClick=${() => setAspect(a)}
                                class="px-4 py-2 rounded-full text-[10px] font-bold uppercase tracking-widest border transition-all ${aspect === a ? 'bg-black text-white border-black' : 'bg-white text-slate-400 border-slate-100'}"
                            >
                                ${a === '1:1' ? 'Квадрат' : a === '9:16' ? 'Портрет' : 'Пейзаж'}
                            </button>
                        `)}
                    </div>

                    <div class="min-h-[400px]">
                        ${status === 'LOADING' && html`
                            <div class="flex flex-col items-center py-24 animate-pulse">
                                <div class="w-12 h-12 border-4 border-slate-100 border-t-black rounded-full animate-spin mb-6"></div>
                                <p class="text-[10px] font-bold text-slate-300 uppercase tracking-[0.3em]">Гришка колдует...</p>
                            </div>
                        `}
                        
                        ${status === 'SUCCESS' && result && html`
                            <div class="animate-in space-y-8">
                                <div class="bg-white p-2 rounded-[2.5rem] shadow-2xl border">
                                    <img src=${result.url} class="w-full rounded-[2rem]" />
                                </div>
                                <div class="flex justify-center gap-6">
                                    <button onClick=${download} class="flex items-center gap-2 text-[10px] font-bold text-slate-400 uppercase tracking-[0.3em] hover:text-black transition-colors">
                                        <${Icon} name="download" size=${14} /> Сохранить
                                    </button>
                                    <button onClick=${() => setStatus('IDLE')} class="text-[10px] font-bold text-slate-300 uppercase tracking-[0.3em] hover:text-black transition-colors">Начать заново</button>
                                </div>
                            </div>
                        `}

                        ${status === 'IDLE' && !result && html`
                            <div class="grid grid-cols-2 gap-6 opacity-[0.03]">
                                <div class="aspect-square bg-black rounded-[2rem]"></div>
                                <div class="aspect-square bg-black rounded-[2rem]"></div>
                            </div>
                        `}
                    </div>

                    ${history.length > 0 && html`
                        <div class="mt-24 border-t border-slate-100 pt-12">
                            <h2 class="text-[10px] font-bold text-slate-300 uppercase tracking-[0.4em] mb-8 text-center">История генераций</h2>
                            <div class="grid grid-cols-3 md:grid-cols-4 gap-4">
                                ${history.map(item => html`
                                    <div onClick=${() => { setPrompt(item.prompt); window.scrollTo({top: 0, behavior: 'smooth'}); }} class="aspect-square bg-white rounded-2xl border border-slate-100 overflow-hidden cursor-pointer hover:border-black transition-all group relative">
                                        ${item.url ? html`<img src=${item.url} class="w-full h-full object-cover" />` : html`<div class="w-full h-full flex items-center justify-center bg-slate-50"><${Icon} name="image" className="text-slate-100" /></div>`}
                                        <div class="absolute inset-0 bg-black/40 opacity-0 group-hover:opacity-100 flex items-center justify-center transition-all">
                                            <${Icon} name="eye" className="text-white" />
                                        </div>
                                    </div>
                                `)}
                            </div>
                        </div>
                    `}
                </div>

                ${showAuth && html`
                    <div class="fixed inset-0 bg-black/60 backdrop-blur-sm flex items-center justify-center p-4 z-[100] animate-in">
                        <div class="bg-white w-full max-w-md rounded-[3rem] p-10 shadow-2xl relative">
                            <button onClick=${() => setShowAuth(false)} class="absolute top-8 right-8 text-slate-300 hover:text-black transition-colors">
                                <${Icon} name="x" size=${24} />
                            </button>
                            
                            <h2 class="text-2xl font-bold mb-10">Аккаунт</h2>
                            
                            ${user ? html`
                                <div class="text-center space-y-6">
                                    <img src=${user.photoURL || 'https://ui-avatars.com/api/?name=' + user.email} class="w-20 h-20 rounded-full mx-auto border-4 border-slate-50 shadow-md" />
                                    <p class="font-bold text-lg">${user.email}</p>
                                    <button onClick=${() => signOut(auth)} class="w-full bg-slate-100 py-5 rounded-2xl font-bold hover:bg-red-50 hover:text-red-600 transition-all">Выйти</button>
                                </div>
                            ` : html`
                                <div class="space-y-4">
                                    <button onClick=${() => signInWithPopup(auth, new GoogleAuthProvider())} class="w-full border-2 border-slate-100 py-4 rounded-2xl font-bold flex items-center justify-center gap-4 hover:bg-slate-50 transition-all">
                                        <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" class="w-6" /> Google
                                    </button>
                                    <button onClick=${handleYandex} class="w-full bg-[#ff0000] text-white py-4 rounded-2xl font-bold flex items-center justify-center gap-4 hover:opacity-90 transition-all">
                                        <span class="text-xl font-black">Я</span> Яндекс ID
                                    </button>
                                    
                                    <div class="relative flex items-center py-4">
                                        <div class="flex-grow border-t border-slate-100"></div>
                                        <span class="mx-4 text-[10px] font-bold text-slate-200 uppercase tracking-widest">или почта</span>
                                        <div class="flex-grow border-t border-slate-100"></div>
                                    </div>
                                    
                                    <input placeholder="Email" class="w-full bg-slate-50 p-5 rounded-2xl outline-none focus:ring-2 focus:ring-black/5" onChange=${e => setEmail(e.target.value)} />
                                    <input type="password" placeholder="Пароль" class="w-full bg-slate-50 p-5 rounded-2xl outline-none focus:ring-2 focus:ring-black/5" onChange=${e => setPassword(e.target.value)} />
                                    
                                    <button onClick=${handleAuth} class="w-full bg-black text-white py-5 rounded-2xl font-bold shadow-xl hover:opacity-80 transition-all">
                                        ${authMode === 'LOGIN' ? 'Войти' : 'Создать аккаунт'}
                                    </button>
                                    
                                    <button onClick=${() => setAuthMode(authMode === 'LOGIN' ? 'SIGNUP' : 'LOGIN')} class="w-full text-[10px] font-bold text-slate-300 uppercase tracking-widest hover:text-black transition-colors">
                                        ${authMode === 'LOGIN' ? 'Нет аккаунта? Зарегистрироваться' : 'Уже есть аккаунт? Войти'}
                                    </button>
                                </div>
                            `}
                        </div>
                    </div>
                `}
                <footer class="py-12 text-center opacity-20 text-[9px] font-bold uppercase tracking-[0.5em]">© 2024 Grishka AI</footer>
            `;
        }

        ReactDOM.createRoot(document.getElementById('root')).render(html`<${App} />`);
    </script>
</body>
</html>
